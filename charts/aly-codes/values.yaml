replicaCount: 2

image:
  repository: ghcr.io/alyraffauf/aly.codes
  tag: latest
  pullPolicy: Always

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

service:
  type: NodePort
  port: 80
  nodePort: 8282

ingress:
  enabled: true
  className: traefik
  hosts:
    - aly.codes
    - www.aly.codes
  tls:
    - hosts:
        - aly.codes
        - www.aly.codes
      secretName: aly-codes-tls
