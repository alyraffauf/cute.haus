# Filled by values/secrets/jellyfin-creds.yaml via vals + sops.
# Renders a Secret used as `envFrom` on the rclone sidecar in the upstream
# jellyfin chart. The `combined` rclone remote unions every B2 bucket below
# under one mount, so jellyfin sees /media/cloud/{Music,Movies,Shows,...}.
secret:
  name: jellyfin-rclone
  keyId: ""
  appKey: ""
  upstreams: >-
    Music=b2:aly-music
    Movies=b2:aly-movies
    Shows=b2:aly-shows
    Anime=b2:aly-anime
    Audiobooks=b2:aly-audiobooks
