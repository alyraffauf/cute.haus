apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: flux-system
spec:
  interval: 15m
  releaseName: reflector
  targetNamespace: kube-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: reflector
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
      version: 10.0.55
