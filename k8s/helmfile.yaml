# Low history; CRD-heavy charts (cert-manager, traefik, cnpg) push each
# revision Secret to ~1MB, and the default of 10 stalls the apiserver.
helmDefaults:
  historyMax: 3

repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: traefik
    url: https://traefik.github.io/charts
  - name: longhorn
    url: https://charts.longhorn.io
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts
  - name: tailscale
    url: https://pkgs.tailscale.com/helmcharts
  - name: jetstack
    url: https://charts.jetstack.io
  - name: nfd
    url: https://kubernetes-sigs.github.io/node-feature-discovery/charts
  - name: intel
    url: https://intel.github.io/helm-charts/

releases:
  # ─── Cluster infra ──────────────────────────────────────────────────────
  # Ingress, storage, postgres operator, tailscale operator. These come
  # before any app release that depends on their CRDs / StorageClasses.

  # ─── Apps ───────────────────────────────────────────────────────────────

  - name: error-pages
    namespace: default
    chart: ./charts/error-pages
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: aly-codes
    namespace: default
    chart: ./charts/aly-codes
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: switchyard
    namespace: default
    chart: ./charts/switchyard
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: audiobookshelf
    namespace: default
    chart: ./charts/audiobookshelf
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/audiobookshelf.yaml

  - name: morsels
    namespace: default
    chart: ./charts/morsels
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: ombi
    namespace: default
    chart: ./charts/ombi
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: pocket-id
    namespace: default
    chart: ./charts/pocket-id
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/global.yaml
      - values/secrets/pocket-id.yaml

  - name: forward-auth
    namespace: default
    chart: ./charts/forward-auth
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/forward-auth.yaml

  - name: immich
    namespace: default
    chart: ./charts/immich
    needs:
      - default/cluster-tls
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/immich.yaml

  - name: jellyfin
    namespace: default
    chart: ./charts/jellyfin
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: plex
    namespace: default
    chart: ./charts/plex
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: navidrome
    namespace: default
    chart: ./charts/navidrome
    needs:
      - default/cluster-tls
      - default/forward-auth
    values:
      - values/global.yaml
      - values/secrets/navidrome.yaml

  - name: paperless
    namespace: default
    chart: ./charts/paperless
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
      - default/tika
      - default/gotenberg
    values:
      - values/global.yaml
      - values/secrets/paperless.yaml

  - name: nextcloud
    namespace: default
    chart: ./charts/nextcloud
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/nextcloud.yaml

  - name: collabora
    namespace: default
    chart: ./charts/collabora
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: uptime-kuma
    namespace: default
    chart: ./charts/uptime-kuma
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml

  - name: vaultwarden
    namespace: default
    chart: ./charts/vaultwarden
    needs:
      - default/cluster-tls
    values:
      - values/global.yaml
      - values/secrets/vaultwarden.yaml

  # Postgres role + database managed declaratively by pg-shared.
  - name: forgejo
    namespace: default
    chart: ./charts/forgejo
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
      - default/valkey
    values:
      - values/global.yaml
      - values/secrets/forgejo.yaml

  - name: tranquil-pds
    namespace: default
    chart: ./charts/tranquil-pds
    needs:
      - default/cluster-tls
      - cnpg-system/pg-shared
    values:
      - values/global.yaml
      - values/secrets/tranquil-pds.yaml

  # Ingress + Service + EndpointSlice for services that live OUTSIDE the
  # cluster (on tailnet IPs). e.g. plex/immich on jubilife, audiobookshelf
  # on eterna. See charts/external-routes/values.yaml for the route list.
  - name: external-routes
    namespace: default
    chart: ./charts/external-routes
    needs:
      - default/cluster-tls
      - tailscale/tailscale-operator
    values:
      - values/global.yaml
