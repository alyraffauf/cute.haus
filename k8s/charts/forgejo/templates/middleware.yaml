apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Chart.Name }}-ratelimit
  labels:
    app: {{ .Chart.Name }}
spec:
  # Crawlers (esp. AI scrapers) hammer repo browse/commit/blame pages, each of
  # which forks git subprocesses — concurrency spikes memory and OOM-kills the
  # pod. Cap the request rate per real client. Behind Cloudflare, Traefik only
  # sees CF edge IPs, so key on the Cf-Connecting-Ip header instead.
  rateLimit:
    average: 30
    burst: 60
    period: 1s
    sourceCriterion:
      requestHeaderName: Cf-Connecting-Ip
