# Longhorn's helm release references the first-class longhorn-b2 Secret via
# defaultBackupStore.backupTargetCredentialSecret.

# Daily backup of every volume in the implicit `default` group (i.e. all of
# them). retain is per-volume; concurrency caps parallel jobs cluster-wide.
recurringJob:
  name: daily-backup
  cron: "0 5 * * *" # 5am UTC, after CNPG's base backup at 4am
  retain: 14
  concurrency: 2

# Expose the Longhorn UI on the tailnet. Longhorn-frontend has no built-in
# auth — do NOT expose publicly.
tailnet:
  enabled: true
  hostname: longhorn
  ingressName: longhorn-ui
  serviceName: longhorn-frontend
  servicePort: 80
  proxyClass:
    name: longhorn-ui-same-node
  affinity:
    matchLabels:
      app: longhorn-ui
    namespaces:
      - longhorn-system
