replicaCount: 1

image:
  repository: ghcr.io/tarampampam/error-pages
  tag: 4@sha256:96855caa28e08a96bb9ff746a7c094b43235351bad79806c2210f9e7677abce9
  pullPolicy: IfNotPresent

env:
  TEMPLATE_NAME: app-down

resources:
  requests:
    cpu: 5m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 32Mi

ports:
  - name: http
    containerPort: 8080

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080

probes:
  liveness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 30
  readiness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 10
