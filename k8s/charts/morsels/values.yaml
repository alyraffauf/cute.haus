replicaCount: 1
strategy: Recreate
dnsPolicy: Default

image:
  repository: ghcr.io/alyraffauf/morsels
  tag: latest@sha256:e58cd4de9fa605ce945ef184d729f288e5b2d4dafc7a7f4b495ddb12dd3610bf
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ports:
  - name: http
    containerPort: 8000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000

persistence:
  enabled: true
  storageClassName: longhorn
  size: 256Mi
  mountPath: /data

failover:
  fastTolerationSeconds: 60

probes:
  startup:
    httpGet: { path: /, port: http }
    periodSeconds: 5
    failureThreshold: 24
    timeoutSeconds: 3
  liveness:
    httpGet: { path: /, port: http }
    periodSeconds: 30
    timeoutSeconds: 3
  readiness:
    httpGet: { path: /, port: http }
    periodSeconds: 10
    timeoutSeconds: 3

ingress:
  enabled: true
  className: traefik
  routes:
    - host: morsels.blue
      aliases: [www.morsels.blue]
      tlsSecret: morsels-blue-tls
