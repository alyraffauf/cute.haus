apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy | default "Recreate" }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      {{- if hasKey .Values "enableServiceLinks" }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.failover }}
      {{- if .fastTolerationSeconds }}
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .fastTolerationSeconds }}
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .fastTolerationSeconds }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with .Values.envFromSecret }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /paperless/data
              subPath: data
            - name: data
              mountPath: /paperless/consume
              subPath: consume
            - name: media
              mountPath: {{ .Values.rclone.mountPath }}
              mountPropagation: HostToContainer
          {{- with .Values.probes }}
          {{- with .startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}

        - name: rclone
          image: "{{ .Values.rclone.image.repository }}:{{ .Values.rclone.image.tag }}"
          imagePullPolicy: {{ .Values.rclone.image.pullPolicy | default "IfNotPresent" }}
          args:
            - mount
            - {{ .Values.rclone.remote | quote }}
            - {{ .Values.rclone.mountPath | quote }}
            - --allow-non-empty
            - --allow-other
            - --vfs-cache-mode=full
            - --vfs-cache-max-age={{ .Values.rclone.vfsCacheMaxAge }}
            - --vfs-cache-max-size={{ .Values.rclone.vfsCacheMaxSize }}
            - --uid=1000
            - --gid=1000
            - --umask=022
            - --log-level=INFO
          securityContext:
            privileged: true
          {{- with .Values.envFromSecret }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.rclone.mountPath }}
              mountPropagation: Bidirectional

        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-data
        - name: media
          emptyDir: {}
