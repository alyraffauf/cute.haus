apiVersion: v1
kind: Service
metadata:
  name: immich
  labels:
    app: immich
spec:
  type: ClusterIP
  selector:
    app: immich
  ports:
    - name: http
      port: 80
      targetPort: 2283
---
apiVersion: v1
kind: Service
metadata:
  name: immich-ml
  labels:
    app: immich-ml
spec:
  type: ClusterIP
  selector:
    app: immich-ml
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgres
  labels:
    app: immich-postgres
spec:
  type: ClusterIP
  selector:
    app: immich-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
