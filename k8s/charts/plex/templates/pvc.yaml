apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Chart.Name }}-config
  labels:
    app: {{ .Chart.Name }}
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - jubilife
  hostPath:
    path: /mnt/Data/plex
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-config
  labels:
    app: {{ .Chart.Name }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: {{ .Chart.Name }}-config
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Chart.Name }}-media
  labels:
    app: {{ .Chart.Name }}
spec:
  capacity:
    storage: 14Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - jubilife
  hostPath:
    path: /mnt/Media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-media
  labels:
    app: {{ .Chart.Name }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  volumeName: {{ .Chart.Name }}-media
  resources:
    requests:
      storage: 14Ti
