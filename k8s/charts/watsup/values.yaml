replicaCount: 2
spread: true
dnsPolicy: Default

image:
  repository: ghcr.io/alyraffauf/watsup
  tag: latest@sha256:e88bcdbc92da35cdaad66d39af928fa5117ceb4bbcb1e0cb0d95bfe867e9d28d
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

ports:
  - name: http
    containerPort: 3000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000

probes:
  liveness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 2
    periodSeconds: 5

ingress:
  enabled: true
  className: traefik
  routes:
    - host: cute.haus
      aliases: [www.cute.haus]
      tlsSecret: cute-haus-tls
