replicaCount: 2
spread: true
dnsPolicy: Default

image:
  repository: ghcr.io/alyraffauf/watsup
  tag: latest@sha256:189be8bde646d8e895e1da1169d34b429c147f60dd426d0e05393fd245e2f0ea
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

ports:
  - name: http
    containerPort: 3000

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000

probes:
  liveness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 2
    periodSeconds: 5

ingress:
  enabled: true
  className: traefik
  routes:
    - host: cute.haus
      aliases: [www.cute.haus]
      tlsSecret: cute-haus-tls
