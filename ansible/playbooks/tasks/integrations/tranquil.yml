---
# tranquil's chart expects SSO_OIDC_* env names.
- ansible.builtin.include_tasks: _write-secret-and-restart.yml
  vars:
    secret_name: tranquil-sso-env
    secret_data:
      SSO_OIDC_CLIENT_ID: "{{ client_credentials_by_slug[client_spec.slug].client_id }}"
      SSO_OIDC_CLIENT_SECRET: "{{ client_credentials_by_slug[client_spec.slug].client_secret }}"
    deployment_name: tranquil-pds
