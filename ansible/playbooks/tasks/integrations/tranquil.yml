---
# Maps the generic oidc-client-tranquil Secret's keys into the SSO_OIDC_*
# env names tranquil's chart expects via envFromSecret.
- name: "[tranquil] Write SSO env Secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tranquil-sso-env
        namespace: "{{ k8s_namespace }}"
        labels:
          app.kubernetes.io/managed-by: ansible-oidc-bootstrap
          app.kubernetes.io/component: sso-env
        annotations:
          helm.sh/resource-policy: keep
      type: Opaque
      stringData:
        SSO_OIDC_CLIENT_ID: "{{ client_credentials_map[client_spec.key].client_id }}"
        SSO_OIDC_CLIENT_SECRET: "{{ client_credentials_map[client_spec.key].client_secret }}"
  no_log: true
  register: tranquil_sso_secret

# envFrom values are read only at pod start, so rotations need a restart.
- name: "[tranquil] Rollout restart to pick up new env"
  when: tranquil_sso_secret.changed
  kubernetes.core.k8s:
    state: patched
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ k8s_namespace }}"
    name: tranquil-pds
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%FT%TZ') }}"
