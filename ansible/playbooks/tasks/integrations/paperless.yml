---
- name: "[paperless] Build PAPERLESS_SOCIALACCOUNT_PROVIDERS JSON"
  ansible.builtin.set_fact:
    paperless_social_providers:
      openid_connect:
        APPS:
          - provider_id: pocket-id
            name: cute.haus
            client_id: "{{ client_credentials_by_slug[client_spec.slug].client_id }}"
            secret: "{{ client_credentials_by_slug[client_spec.slug].client_secret }}"
            settings:
              server_url: "{{ pocket_id_url }}/.well-known/openid-configuration"
        OAUTH_PKCE_ENABLED: true
  no_log: true

- ansible.builtin.include_tasks: _write-secret-and-restart.yml
  vars:
    secret_name: paperless-sso-env
    secret_data:
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: "{{ paperless_social_providers | to_json }}"
    deployment_name: paperless
