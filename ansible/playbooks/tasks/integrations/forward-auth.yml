---
- ansible.builtin.include_tasks: _write-secret-and-restart.yml
  vars:
    secret_name: "{{ client_spec.slug }}-oidc-env"
    secret_data:
      PROVIDERS_OIDC_CLIENT_ID: "{{ client_credentials_by_slug[client_spec.slug].client_id }}"
      PROVIDERS_OIDC_CLIENT_SECRET: "{{ client_credentials_by_slug[client_spec.slug].client_secret }}"
    deployment_name: "{{ client_spec.slug }}"
